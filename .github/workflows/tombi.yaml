---
name: "tombi"

on:
  pull_request:
    branches: ["master"]
    paths:
      - "**.toml"
      - ".github/workflows/tombi.yaml"
  push:
    branches: ["master"]
    paths:
      - "**.toml"
      - ".github/workflows/tombi.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
      - uses: tombi-toml/setup-tombi@v1
      - name: Lint with tombi
        run: tombi check

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
      - uses: tombi-toml/setup-tombi@v1
      - name: Format with tombi
        run: tombi format --check --diff
